name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run scaffolder smoke tests
        run: ./tests/run_smoke_tests.sh

      - name: Lint scaffold_vault.py
        run: |
          python3 -m py_compile scripts/scaffold_vault.py

  package-skill:
    runs-on: ubuntu-latest
    needs: smoke-tests
    steps:
      - uses: actions/checkout@v4
      - name: Build .skill artifact
        run: |
          mkdir -p dist
          # Skill bundle = SKILL.md + scripts/ + references/
          cd "$(mktemp -d)" && cp -r $GITHUB_WORKSPACE/SKILL.md . && \
            cp -r $GITHUB_WORKSPACE/scripts . && \
            cp -r $GITHUB_WORKSPACE/references . && \
            zip -r $GITHUB_WORKSPACE/dist/obsidian-vault-scaffolder.skill SKILL.md scripts references
      - uses: actions/upload-artifact@v4
        with:
          name: obsidian-vault-scaffolder
          path: dist/obsidian-vault-scaffolder.skill
